# ============================================================
# THESIS EXPERIMENT — Baseline Config
# ============================================================
# Original GIBO with fixed inner loop --> matches gibo_default.yaml exactly.
# This is the reference method for all research questions.
#
# Run: python run_thesis_experiment.py
#          -c experiments/thesis_experiments/configs/gibo_baseline.yaml
#          -d experiments/thesis_experiments/data

name: gibo_baseline
description: "Original GIBO: fixed inner loop M=dim, SGD gradient step (baseline)"


dimensions: [4, 8, 12, 16, 20, 24, 28, 32, 36]
n_runs: 40                # num_objectives from data generation
seed_start: 0
max_objective_calls: 300


noise_variance: 0.01
gp_hypers:
  outputscale: 1.0

factor_lengthscale: 2


inner_loop_mode: original
max_samples_per_iteration: dim_search_space   # resolved to dim at runtime
epsilon_diff_acq_value: 0.1                   # matches gibo_default.yaml


lr: 0.25
lr_schedular: null
normalize_gradient: true
standard_deviation_scaling: false

N_max: variable         
optimize_hyperparameters: false
no_noise_optimization: false


acqf_num_restarts: 5
acqf_raw_samples: 64
delta: 0.2                


c1: 0.05
c2: 0.5
c_W: 0.3


results_dir: experiments/thesis_experiments/results
verbose: false
