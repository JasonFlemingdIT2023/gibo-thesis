# ============================================================
# THESIS EXPERIMENT — Ablation: EI step + p_Wolfe, delta=alpha_max=0.3, c_W=0.43
# ============================================================
# EI step size selector (ei_pwolfe) with tighter search radius:
# alpha_max=delta=0.3 makes step size and GI sampling radius consistent.
# c_W=0.43 slightly more lenient than the 0.44 argmax-mu experiment.

name: gibo_prob_wolfe_43
description: "EI step + p_Wolfe, delta=alpha_max=0.3, c_W=0.43, sigma_floor=0.1"

dimensions: [4, 8, 12, 16, 20, 24, 28, 32, 36]
n_runs: 40
seed_start: 0
max_objective_calls: 300

noise_variance: 0.01
gp_hypers:
  outputscale: 1.0
factor_lengthscale: 2

inner_loop_mode: ei_pwolfe
max_samples_per_iteration: dim_search_space
min_samples_per_iteration: 2
epsilon_diff_acq_value: null

lr: 0.25
lr_schedular: null
normalize_gradient: false
standard_deviation_scaling: false

N_max: variable
optimize_hyperparameters: false
no_noise_optimization: false

acqf_num_restarts: 5
acqf_raw_samples: 64
delta: 0.3                      # GI acquisition box
alpha_max: 0.3                  # line search upper bound = delta (consistent)

c1: 0.05
c2: 0.5
c_W: 0.43
sigma_floor: 0.1
tau_snr: 1.0                    # unused

results_dir: experiments/thesis_experiments/results
verbose: false
