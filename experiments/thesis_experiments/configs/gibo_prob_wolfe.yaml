# ============================================================
# THESIS EXPERIMENT — Variant A Config
# ============================================================
# GIBO with probabilistic Wolfe conditions for inner loop termination.
# alpha* = argmax mu_post(theta + alpha*p), stop when p_Wolfe > c_W.
# All GP/model params identical to baseline for fair comparison.
#
# Run: python run_thesis_experiment.py
#          -c experiments/thesis_experiments/configs/gibo_prob_wolfe.yaml
#          -d experiments/thesis_experiments/data

name: gibo_prob_wolfe
description: "Variant A: probabilistic Wolfe conditions, argmax-mu step size"

# --- Experiment scope (identical to baseline) ---
dimensions: [4, 8, 12, 16, 20, 24, 28, 32, 36]
n_runs: 40
seed_start: 0
max_objective_calls: 300

noise_variance: 0.01
gp_hypers:
  outputscale: 1.0
factor_lengthscale: 2

inner_loop_mode: prob_wolfe
max_samples_per_iteration: 50   # safety limit replaces fixed M
epsilon_diff_acq_value: null    # our stopping criterion replaces epsilon_diff

lr: 0.25                        # kept for structural consistency (unused)
lr_schedular: null
normalize_gradient: false       # direction already normalized via p
standard_deviation_scaling: false

N_max: variable                 # 5 * dim
optimize_hyperparameters: false
no_noise_optimization: false

acqf_num_restarts: 5
acqf_raw_samples: 64
delta: 0.2                      # also used as upper bound for alpha search

c1: 0.05                        # Armijo constant
c2: 0.5                         # curvature constant
c_W: 0.3                        # Wolfe probability threshold

results_dir: experiments/thesis_experiments/results
verbose: false
